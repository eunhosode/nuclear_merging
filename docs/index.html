<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nuclear_merging</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f2f4f8;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      display: grid;
      gap: 12px;
      justify-items: center;
      position: relative;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    canvas {
      display: block;
      width: 800px;
      height: 600px;
      max-width: calc(100vw - 24px);
      max-height: calc((100vw - 24px) * 0.75);
      background: #ffffff;
      border: 1px solid #c7ced8;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
    }

    .game-frame {
      position: relative;
    }

    .name-screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(242, 244, 248, 0.92);
      border: 1px solid #c7ced8;
    }

    .name-form {
      width: min(360px, calc(100vw - 48px));
      display: grid;
      gap: 12px;
      padding: 22px;
      background: #ffffff;
      border: 1px solid #c7ced8;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.16);
    }

    .name-form label {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .name-form input,
    .name-form button {
      width: 100%;
      height: 44px;
      font: inherit;
    }

    .name-form input {
      padding: 0 12px;
      border: 1px solid #9ca3af;
    }

    .name-form button {
      border: 1px solid #374151;
      background: #111827;
      color: #ffffff;
      cursor: pointer;
    }

    .name-screen.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>nuclear_merging</h1>
    <div class="game-frame">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      <div id="playerNameScreen" class="name-screen">
        <form id="playerNameForm" class="name-form">
          <label for="playerNameInput">Player Name</label>
          <input id="playerNameInput" type="text" maxlength="20" autocomplete="off" required autofocus>
          <button type="submit">Start</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const width = 800;
    const height = 600;
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const playerNameScreen = document.getElementById("playerNameScreen");
    const playerNameForm = document.getElementById("playerNameForm");
    const playerNameInput = document.getElementById("playerNameInput");

    const WHITE = "#ffffff";
    const RED = "#ff0000";
    const BLUE = "#0000ff";
    const BLACK = "#000000";
    const GREEN = "#00c800";
    const GRAY = "#dcdcdc";
    const DARK_GRAY = "#505050";
    const FOG_GRAY = "rgba(180, 180, 180, 0.96)";

    const elementNames = {
      1: "H", 2: "He", 3: "Li", 4: "Be", 5: "B", 6: "C",
      7: "N", 8: "O", 9: "F", 10: "Ne", 11: "Na", 12: "Mg",
      13: "Al", 14: "Si", 15: "P", 16: "S", 17: "Cl", 18: "Ar",
      19: "K", 20: "Ca", 21: "Sc", 22: "Ti", 23: "V", 24: "Cr",
      25: "Mn", 26: "Fe", 27: "Co", 28: "Ni", 29: "Cu", 30: "Zn",
      31: "Ga", 32: "Ge", 33: "As", 34: "Se", 35: "Br", 36: "Kr"
    };

    const baselineIsotopes = [
      [1, 1], [1, 2],
      [2, 3], [2, 4],
      [3, 6], [3, 7],
      [4, 9],
      [5, 10], [5, 11],
      [6, 12], [6, 13],
      [7, 14], [7, 15],
      [8, 16], [8, 17], [8, 18],
      [9, 19],
      [10, 20], [10, 21], [10, 22],
      [11, 23],
      [12, 24], [12, 25], [12, 26],
      [13, 27],
      [14, 28], [14, 29], [14, 30],
      [15, 31],
      [16, 32], [16, 33], [16, 34], [16, 36],
      [17, 35], [17, 37],
      [18, 36], [18, 38], [18, 40],
      [19, 39], [19, 41],
      [20, 40], [20, 42], [20, 43], [20, 44], [20, 46],
      [21, 45],
      [22, 46], [22, 47], [22, 48], [22, 49], [22, 50],
      [23, 51],
      [24, 50], [24, 52], [24, 53], [24, 54],
      [25, 55],
      [26, 54], [26, 56], [26, 57], [26, 58],
      [27, 59],
      [28, 58], [28, 60], [28, 61], [28, 62], [28, 64],
      [29, 63], [29, 65],
      [30, 64], [30, 66], [30, 67], [30, 68], [30, 70],
      [31, 69], [31, 71],
      [32, 70], [32, 72], [32, 73], [32, 74], [32, 76],
      [33, 75],
      [34, 74], [34, 76], [34, 77], [34, 78], [34, 80], [34, 82],
      [35, 79], [35, 81],
      [36, 78], [36, 80], [36, 82], [36, 83], [36, 84], [36, 86]
    ];

    const isotopeDecayLevels = {};
    for (const isotope of baselineIsotopes) {
      isotopeDecayLevels[isotope.join(",")] = 0;
    }
    Object.assign(isotopeDecayLevels, {
      "1,3": 1,
      "4,10": 1,
      "6,14": 1,
      "19,40": 1,
      "20,48": 1,
      "22,50": 1,

      "13,26": 2,
      "17,36": 2,
      "18,39": 2,
      "18,42": 2,
      "20,41": 2,
      "25,53": 2,
      "26,60": 2,
      "28,59": 2,
      "34,79": 2,
      "36,81": 2,

      "14,32": 3,
      "18,39": 3,
      "18,42": 3,
      "22,44": 3,
      "28,63": 3,
      "36,85": 3,

      "11,22": 4,
      "20,45": 4,
      "23,49": 4,
      "25,54": 4,
      "26,55": 4,
      "27,57": 4,
      "30,65": 4,
      "32,68": 4,
      "34,75": 4
    });

    const decayChances = {
      0: 0.00,
      1: 0.05,
      2: 0.10,
      3: 0.15,
      4: 0.20,
      5: 0.40
    };

    const atomicRadiusRules = [
      [1, 2, 20, 4],
      [3, 10, 30, 1.5],
      [11, 18, 36, 1.7],
      [19, 36, 42, 1.2]
    ];

    function getAtomicRadius(protons) {
      for (const [periodStart, periodEnd, largestRadius, shrinkPerElement] of atomicRadiusRules) {
        if (periodStart <= protons && protons <= periodEnd) {
          const position = protons - periodStart;
          return Math.round(largestRadius - position * shrinkPerElement);
        }
      }
      return 18;
    }

    function getPhotonCount(protons) {
      if (protons <= 2) return 3;
      if (protons <= 10) return 4;
      if (protons <= 18) return 5;
      return 6;
    }

    function createPlayer() {
      return {
        x: Math.floor(width / 2),
        y: height - 60,
        radius: getAtomicRadius(1),
        protons: 1,
        neutrons: 0
      };
    }

    function getIsotopeLabel(protons, neutrons) {
      const massNumber = protons + neutrons;
      const name = elementNames[protons] || `Element-${protons}`;
      return `${name}-${massNumber}`;
    }

    function getTimeLabel(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = seconds % 60;
      return `${minutes}min ${remainingSeconds}sec`;
    }

    const levels = {
      "Easy": {
        weights: [30, 60, 0],
        particleSpeed: 3,
        neutronDecay: "vanish"
      },
      "Normal": {
        weights: [30, 60, 10],
        particleSpeed: 3,
        photonSpeed: 6,
        neutronDecay: "vanish"
      },
      "Hard": {
        weights: [30, 60, 10],
        particleSpeed: 3,
        photonSpeed: 9,
        neutronDecay: "vanish"
      },
      "Speedy": {
        weights: [30, 60, 5],
        particleSpeed: 6,
        photonSpeed: 12,
        neutronDecay: "vanish"
      },
      "Is it snail?": {
        weights: [30, 60, 10],
        particleSpeed: 1,
        photonSpeed: 18,
        neutronDecay: "vanish"
      },
      "Choking": {
        weights: [30, 60, 90],
        particleSpeed: 3,
        photonSpeed: 1,
        neutronDecay: "vanish"
      },
      "Miserable": {
        weights: [30, 60, 90],
        particleSpeed: 3,
        photonSpeed: 9,
        neutronDecay: "vanish"
      },
      "Schrödinger's particle": {
        weights: [50, 50, 0],
        particleSpeed: 3,
        photonSpeed: 12,
        neutronDecay: "photon",
        neutronDecayChance: 0.75,
        protonDecay: "photon",
        protonDecayChance: 0.75
      },
      "Midgley's Gas": {
        weights: [30, 60, 90],
        particleSpeed: 3,
        photonSpeed: 18,
        neutronDecay: "photon",
        neutronDecayChance: 0.75,
        protonDecay: "photon",
        protonDecayChance: 0.75
      },
      "Permian": {
        weights: [1, 1, 1],
        particleSpeed: 18,
        photonSpeed: 18,
        neutronDecay: "photon",
        neutronDecayChance: 0.9,
        protonDecay: "photon",
        protonDecayChance: 0.9
      },
      "Fog": {
        weights: [30, 60, 10],
        particleSpeed: 3,
        photonSpeed: 6,
        neutronDecay: "vanish",
        fog: true
      },
      "Paralysis": {
        weights: [30, 60, 10],
        particleSpeed: 3,
        photonSpeed: 6,
        neutronDecay: "vanish",
        paralysis: true,
        paralysisInterval: 10000,
        paralysisDuration: 3000,
        paralysisChance: 0.5
      }
    };

    const levelNames = [
      "Easy",
      "Normal",
      "Hard",
      "Speedy",
      "Is it snail?",
      "Choking",
      "Miserable",
      "Schrödinger's particle",
      "Midgley's Gas",
      "Permian",
      "Fog",
      "Paralysis"
    ];

    const buttonWidth = 180;
    const buttonHeight = 54;
    const buttonGap = 12;
    const buttonColumns = 3;
    const buttonRows = Math.ceil(levelNames.length / buttonColumns);
    const buttonStartX = Math.floor(width / 2 - (buttonColumns * buttonWidth + (buttonColumns - 1) * buttonGap) / 2);
    const buttonStartY = Math.floor(height / 2 - (buttonRows * buttonHeight + (buttonRows - 1) * buttonGap) / 2);

    const levelButtons = levelNames.map((levelName, index) => ({
      label: levelName,
      x: buttonStartX + (index % buttonColumns) * (buttonWidth + buttonGap),
      y: buttonStartY + Math.floor(index / buttonColumns) * (buttonHeight + buttonGap),
      w: buttonWidth,
      h: buttonHeight
    }));

    const restartButton = {
      label: "Restart",
      x: Math.floor(width / 2) - buttonWidth - Math.floor(buttonGap / 2),
      y: Math.floor(height / 2) + 120,
      w: buttonWidth,
      h: buttonHeight
    };

    const otherModeButton = {
      label: "Other Mode",
      x: Math.floor(width / 2) + Math.floor(buttonGap / 2),
      y: Math.floor(height / 2) + 120,
      w: buttonWidth,
      h: buttonHeight
    };

    let player = createPlayer();
    let particles = [];
    let playerName = "";
    let gameState = "name_input";
    let selectedLevel = null;
    let selectedLevelName = "";
    let gameOverStartedAt = 0;
    let gameOverMenuStartedAt = 0;
    let gameOverIsotope = "";
    let gameStartedAt = 0;
    let gameOverElapsedSeconds = 0;
    let nextParalysisCheckAt = 0;
    let paralysisUntil = 0;
    let frameCount = 0;
    let lastFrameAt = 0;
    let accumulatedTime = 0;
    const targetFrameMs = 1000 / 60;
    const maxFrameMs = 250;
    const particleInterval = 25;
    const keys = new Set();

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function weightedChoice(items, weights) {
      const total = weights.reduce((sum, weight) => sum + weight, 0);
      let roll = Math.random() * total;
      for (let i = 0; i < items.length; i++) {
        roll -= weights[i];
        if (roll < 0) return items[i];
      }
      return items[items.length - 1];
    }

    function clearScreen() {
      ctx.fillStyle = WHITE;
      ctx.fillRect(0, 0, width, height);
    }

    function drawCenteredText(text, x, y, size, color = BLACK) {
      ctx.fillStyle = color;
      ctx.font = `${size}px Arial, Helvetica, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y);
    }

    function drawLeftText(text, x, y, size, color = BLACK) {
      ctx.fillStyle = color;
      ctx.font = `${size}px Arial, Helvetica, sans-serif`;
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText(text, x, y);
    }

    function drawButton(button) {
      ctx.fillStyle = GRAY;
      ctx.fillRect(button.x, button.y, button.w, button.h);
      ctx.strokeStyle = DARK_GRAY;
      ctx.lineWidth = 2;
      ctx.strokeRect(button.x, button.y, button.w, button.h);
      drawCenteredText(button.label, button.x + button.w / 2, button.y + button.h / 2, 24);
    }

    function drawCircle(x, y, radius, color) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function isInsideButton(x, y, button) {
      return x >= button.x && x <= button.x + button.w && y >= button.y && y <= button.y + button.h;
    }

    function resetGame(levelName) {
      selectedLevel = levels[levelName];
      selectedLevelName = levelName;
      player = createPlayer();
      particles = [];
      frameCount = 0;
      accumulatedTime = 0;
      gameOverIsotope = "";
      gameStartedAt = performance.now();
      gameOverElapsedSeconds = 0;
      nextParalysisCheckAt = performance.now() + (selectedLevel.paralysisInterval ?? 10000);
      paralysisUntil = 0;
      gameState = "playing";
    }

    function triggerGameOver() {
      gameOverIsotope = getIsotopeLabel(player.protons, player.neutrons);
      gameOverElapsedSeconds = Math.floor((performance.now() - gameStartedAt) / 1000);
      gameState = "game_over";
      gameOverStartedAt = performance.now();
    }

    function spawnParticles() {
      let px = randomInt(20, width - 20);
      const ptype = weightedChoice(["proton", "neutron", "photon"], selectedLevel.weights);

      if (ptype === "photon") {
        for (let i = 0; i < getPhotonCount(player.protons); i++) {
          if (["Choking", "Miserable", "Midgley's Gas", "Permian"].includes(selectedLevelName)) {
            px = randomInt(20, width - 20);
          } else {
            px = Math.max(20, Math.min(width - 20, player.x + randomInt(-60, 60)));
          }
          particles.push({ x: px, y: 0, type: ptype });
        }
      } else {
        const particle = { x: px, y: 0, type: ptype };
        if (ptype === "neutron" && Math.random() < (selectedLevel.neutronDecayChance ?? 0)) {
          particle.vanishY = randomInt(Math.floor(height / 4), Math.floor(height / 2));
        } else if (ptype === "proton" && Math.random() < (selectedLevel.protonDecayChance ?? 0)) {
          particle.vanishY = randomInt(Math.floor(height / 4), Math.floor(height / 2));
        }
        particles.push(particle);
      }
    }

    function updatePlaying() {
      const now = performance.now();
      if (selectedLevel.paralysis && now >= nextParalysisCheckAt) {
        nextParalysisCheckAt = now + (selectedLevel.paralysisInterval ?? 10000);
        if (Math.random() < (selectedLevel.paralysisChance ?? 0.5)) {
          paralysisUntil = now + (selectedLevel.paralysisDuration ?? 3000);
        }
      }

      const isParalyzed = selectedLevel.paralysis && now < paralysisUntil;
      if (!isParalyzed) {
        if ((keys.has("ArrowLeft") || keys.has("KeyA")) && player.x - player.radius > 0) {
          player.x -= 5;
        }
        if ((keys.has("ArrowRight") || keys.has("KeyD")) && player.x + player.radius < width) {
          player.x += 5;
        }
      }

      if (frameCount % particleInterval === 0) {
        spawnParticles();
      }

      for (const particle of particles) {
        const defaultSpeed = particle.type === "photon" ? selectedLevel.photonSpeed : selectedLevel.particleSpeed;
        particle.y += particle.speed ?? defaultSpeed;
      }

      const newParticles = [];
      for (const particle of particles) {
        if (particle.vanishY !== undefined && particle.y >= particle.vanishY) {
          const decayAction = selectedLevel[`${particle.type}Decay`];
          if (decayAction === "photon") {
            particle.type = "photon";
            particle.speed = selectedLevel.photonSpeed;
            delete particle.vanishY;
          } else if (decayAction === "proton" || decayAction === "neutron") {
            particle.type = decayAction;
            delete particle.speed;
            delete particle.vanishY;
          } else {
            continue;
          }
        }

        const dist = Math.hypot(particle.x - player.x, particle.y - player.y);
        if (dist < player.radius + 10) {
          if (particle.type === "photon") {
            triggerGameOver();
            break;
          }

          if (particle.type === "proton") {
            player.protons += 1;
            player.radius = getAtomicRadius(player.protons);
          } else {
            player.neutrons += 1;
          }

          const z = player.protons;
          const a = player.protons + player.neutrons;
          const decayLevel = isotopeDecayLevels[`${z},${a}`] ?? 5;
          if (Math.random() < decayChances[decayLevel]) {
            triggerGameOver();
            break;
          }
        } else {
          newParticles.push(particle);
        }
      }
      particles = newParticles;
    }

    function drawMenu() {
      clearScreen();
      drawCenteredText("Select Level", width / 2, height / 4, 52);
      drawCenteredText("Move with ← → or A/D. Avoid photons. Collect protons and neutrons.", width / 2, height / 4 + 48, 18, DARK_GRAY);
      for (const button of levelButtons) {
        drawButton(button);
      }
    }

    function drawNameInput() {
      clearScreen();
      drawCenteredText("Enter Player Name", width / 2, height / 2 - 30, 52);
      drawCenteredText("Type your name and press Start.", width / 2, height / 2 + 35, 22, DARK_GRAY);
    }

    function drawGameOverSummary(includeButtons) {
      clearScreen();
      if (includeButtons) {
        drawCenteredText("GAME OVER", width / 2, height / 3 - 95, 48);
        drawCenteredText(`Player: ${playerName}`, width / 2, height / 3 - 40, 34);
        drawCenteredText(selectedLevelName, width / 2, height / 3 + 10, 42);
        drawCenteredText(gameOverIsotope, width / 2, height / 3 + 62, 42);
        drawCenteredText(getTimeLabel(gameOverElapsedSeconds), width / 2, height / 3 + 112, 42);
        drawButton(restartButton);
        drawButton(otherModeButton);
      } else {
        drawCenteredText("GAME OVER", width / 2, height / 2 - 120, 52);
        drawCenteredText(`Player: ${playerName}`, width / 2, height / 2 - 58, 38);
        drawCenteredText(selectedLevelName, width / 2, height / 2, 46);
        drawCenteredText(gameOverIsotope, width / 2, height / 2 + 58, 46);
        drawCenteredText(getTimeLabel(gameOverElapsedSeconds), width / 2, height / 2 + 116, 46);
      }
    }

    function drawPlaying() {
      clearScreen();
      drawCircle(player.x, player.y, player.radius, RED);

      for (const particle of particles) {
        const color = particle.type === "proton" ? RED : particle.type === "neutron" ? BLUE : GREEN;
        drawCircle(particle.x, particle.y, 10, color);
      }

      if (selectedLevel.fog) {
        ctx.fillStyle = FOG_GRAY;
        ctx.fillRect(0, height / 4, width, height / 2);
      }

      const massNumber = player.protons + player.neutrons;
      drawLeftText(getIsotopeLabel(player.protons, player.neutrons), 10, 10, 24);
      drawLeftText(`Mass Number: ${massNumber}`, 10, 40, 24);
      drawLeftText(`Mode: ${selectedLevelName}`, 10, 70, 24);
      if (selectedLevel.paralysis && performance.now() < paralysisUntil) {
        drawLeftText("Paralyzed", 10, 100, 24);
      }
    }

    function gameLoop(timestamp) {
      if (!lastFrameAt) lastFrameAt = timestamp;
      const elapsed = Math.min(timestamp - lastFrameAt, maxFrameMs);
      lastFrameAt = timestamp;
      accumulatedTime += elapsed;

      while (accumulatedTime >= targetFrameMs) {
        frameCount += 1;

        if (gameState === "playing") {
          updatePlaying();
        } else if (gameState === "game_over") {
          if (performance.now() - gameOverStartedAt >= 3000) {
            gameState = "game_over_menu";
            gameOverMenuStartedAt = performance.now();
          }
        } else if (gameState === "game_over_menu") {
          if (performance.now() - gameOverMenuStartedAt >= 10000) {
            selectedLevel = null;
            selectedLevelName = "";
            particles = [];
            gameOverIsotope = "";
            gameOverElapsedSeconds = 0;
            nextParalysisCheckAt = 0;
            paralysisUntil = 0;
            gameState = "menu";
          }
        }

        accumulatedTime -= targetFrameMs;
      }

      if (gameState === "name_input") {
        drawNameInput();
      } else if (gameState === "menu") {
        drawMenu();
      } else if (gameState === "playing") {
        drawPlaying();
      } else if (gameState === "game_over") {
        drawGameOverSummary(false);
      } else if (gameState === "game_over_menu") {
        drawGameOverSummary(true);
      }

      requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", (event) => {
      if (gameState !== "playing") return;
      if (["ArrowLeft", "ArrowRight", "KeyA", "KeyD"].includes(event.code)) {
        event.preventDefault();
        keys.add(event.code);
      }
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    playerNameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      playerName = playerNameInput.value.trim() || "Player";
      playerNameScreen.classList.add("hidden");
      gameState = "menu";
    });

    canvas.addEventListener("click", (event) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;

      if (gameState === "menu") {
        for (const button of levelButtons) {
          if (isInsideButton(x, y, button)) {
            resetGame(button.label);
            return;
          }
        }
      } else if (gameState === "game_over_menu") {
        if (isInsideButton(x, y, restartButton)) {
          resetGame(selectedLevelName);
        } else if (isInsideButton(x, y, otherModeButton)) {
          selectedLevel = null;
          selectedLevelName = "";
          particles = [];
          gameOverIsotope = "";
          gameOverElapsedSeconds = 0;
          nextParalysisCheckAt = 0;
          paralysisUntil = 0;
          gameState = "menu";
        }
      }
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
